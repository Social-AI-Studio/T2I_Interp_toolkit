# ── Steer workflow config ──────────────────────────────────────────────────────
# Run: python scripts/run_steer.py
# Override example: python scripts/run_steer.py model_key=CompVis/stable-diffusion-v1-4 device=cuda:1

defaults:
  - _self_

# Model
model_key: runwayml/stable-diffusion-v1-5
device: cuda:0
dtype: float16

# Dataset
dataset_name: nirmalendu01/social-t2i-dataset
prompt_col: prompt

# Latent collection
layer_name: unet.down_blocks.2.attentions.1.transformer_blocks.0.attn2
save_dir: ./latents_cache/social_steering
batch_size: 4
guidance_scale: 7.5
conditional_only: true

# Training
train_steps: 100
lr: 1.0e-4

# Inference
alpha: 10
steer_steps: 5
output_dir: ./output_images/steer
prompts:
  - "A photo of a doctor"
  - "A portrait of a person"

# Hydra — run in-place, no log dirs
hydra:
  output_subdir: null
  run:
    dir: .
  job_logging:
    root:
      level: WARNING
