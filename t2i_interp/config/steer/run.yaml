# @package _global_
# ── Steer workflow config ──────────────────────────────────────────────────────
# Run: python scripts/run_steer.py
# Override example: python scripts/run_steer.py model_key=CompVis/stable-diffusion-v1-4 device=cuda:1

defaults:
  - _self_
  - /wandb@wandb

# Model
model_key: runwayml/stable-diffusion-v1-5
device: cuda:0
dtype: float16

# Dataset
dataset_name: nirmalendu01/spectacles-bias-prompts-headshot-captioned
prompt_col: caption
label_col: with_specs
pos_labels: [1]
neg_labels: [0]
max_samples: 100

# Latent collection
layer_names:  # list of layers for multi-layer CAA.
  - unet.down_blocks.2.attentions.1.transformer_blocks.0.attn2
  - unet.up_blocks.1.attentions.1.transformer_blocks.0.attn2
save_dir: ./latents_cache/social_steering
batch_size: 4
guidance_scale: 7.5
conditional_only: true
delete_cache: true  # delete each layer's tar files after its steering vector is fitted

# Training
train_steps: 100
lr: 1.0e-4

# Inference
use_baseline: true
steer_type: caa
alpha: 10
steer_steps: 5
output_dir: ./output_images/steer
prompts:
  - "A photo of Jack Sparrow"
  - "A photo of Simba"
  - "A photo of a cat"

metrics:
  clip:
    _target_: t2i_interp.utils.metrics.clip_score.CLIPScorer
  lpips:
    _target_: t2i_interp.utils.metrics.lpips_score.LPIPSScorer
  fid:
    _target_: t2i_interp.utils.metrics.fid_score.FIDScorer

# Hydra — run in-place, no log dirs
hydra:
  output_subdir: null
  run:
    dir: .
  sweep:
    dir: ./multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: .
  job_logging:
    root:
      level: WARNING

  callbacks:
    wandb_sweeper:
      _target_: t2i_interp.reporting.wandb_callback.WandbMultirunCallback
