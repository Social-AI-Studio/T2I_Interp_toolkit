extends:
  - ./const.yaml

single_stream_blocks:
  discover: "**.single_transformer_blocks.*"     # each FluxSingleTransformerBlock
  slots:
    mlp:
      # single blocks do: proj_mlp (up) → GELU → concat(attn_out, mlp_act) → proj_out
      up:        "proj_mlp"                      # 3072 -> 12288
      act:       "act_mlp"                       # GELU
      down:      "proj_out"                      # (attn⊕mlp_act) -> 3072
    attn:
      q:         "to_q"                            
      k:         "to_k"                      
      v:         "to_v"   
      
