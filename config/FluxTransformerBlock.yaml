extends:
  - ./const.yaml

dual_stream_blocks:
  discover: "**.transformer_blocks.*"
  slots:
    # per-stream norms
    image_pre_norm:   { target: "norm1" }
    text_pre_norm:    { target: "norm1_context" }
    image_post_norm:  { target: "norm2" }
    text_post_norm:   { target: "norm2_context" }
    
    # MLP / FFN per stream
    mlp_image:
      target: "ff"
      slots:
        up:   "net.0.proj"   # 3072 -> 12288
        act:  "net.0"        # GELU wrapper
        down: "net.2"        # 12288 -> 3072

    mlp_text:
      target: "ff_context"
      slots:
        up:   "net.0.proj"
        act:  "net.0"
        down: "net.2"
