version: 1

# You can put shared defaults here
common:
  dataset: "nirmalendu01/socialcounterfactuals-200"
  val_split: "validation"
  run_name: "steer_mlp_train"
  d_submodule: 768                      # equals INPUT_DIM
  dataset_column: "caption"
  ground_truth_column: ["race", "gender"]
  training_device: "cuda:0"
  data_device: "cpu"
  autocast_dtype: "bfloat16"
  outputs_root: "runs"
  wandb_config: "reporting/config.yaml"
  gt_processing_fn: "scripts.train_pipeline:gt_processing_fn"
  reduce_fn: "scripts.train_pipeline:reduce_fn"   # for prompt input (take last token position)
  mapper: "twohead_mlp"
  mapper_kwargs:
    input_dim: 768
    hidden_dim: 256
    output_dims: [7, 2]
  loss: "torch.nn.CrossEntropyLoss"
  optimizer:
    name: "torch.optim.Adam"
    kwargs:
      lr: 1.0e-5
  flags:
    use_memmap: true
    cache_activations: true
  training:
    train_steps: 30
    refresh_batch_size: 64
    out_batch_size: 32
    subset: 100
  # denoiser_steps: [10]         # (optional) enable when targeting UNet blocks

# You can define one or more experiment blocks. Each runs over its accessor_grid.
experiments:
  - name: "sdxl_text_encoder_2_blocks_0_11"
    accessor_grid:
      - "model.text_encoder_2.blocks[0].out_"
      - "model.text_encoder_2.blocks[1].out_"
      - "model.text_encoder_2.blocks[2].out_"
      - "model.text_encoder_2.blocks[3].out_"
      - "model.text_encoder_2.blocks[4].out_"
      - "model.text_encoder_2.blocks[5].out_"
      - "model.text_encoder_2.blocks[6].out_"
      - "model.text_encoder_2.blocks[7].out_"
      - "model.text_encoder_2.blocks[8].out_"
      - "model.text_encoder_2.blocks[9].out_"
      - "model.text_encoder_2.blocks[10].out_"
      - "model.text_encoder_2.blocks[11].out_"
